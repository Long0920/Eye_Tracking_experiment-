<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>社群媒體研究數據收集系統</title>
    <script src="https://cdn.jsdelivr.net/npm/webgazer@3.5.3/dist/webgazer.js"></script>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; background: white; overflow: hidden; }
        .screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #experiment-stage { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2000; background: white; flex-direction: row; justify-content: space-evenly; align-items: center; }
        .post-column { width: 42vw; display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; padding: 10px; }
        .post-img, .interact-img { width: 100%; height: auto; }
        .Calibration { width: 25px; height: 25px; border-radius: 50%; background: red; position: fixed; display: none; border: none; cursor: pointer; z-index: 5000; }
        #Pt1 { top: 10%; left: 10%; } #Pt2 { top: 10%; left: 50%; } #Pt3 { top: 10%; left: 90%; }
        #Pt4 { top: 50%; left: 10%; } #Pt5 { top: 50%; left: 50%; } #Pt6 { top: 50%; left: 90%; }
        #Pt7 { top: 90%; left: 10%; } #Pt8 { top: 90%; left: 50%; } #Pt9 { top: 90%; left: 90%; }
        .btn { padding: 15px 30px; font-size: 20px; cursor: pointer; border: 2px solid #333; background: white; border-radius: 8px; margin: 10px; }
        .scale-btns { display: flex; gap: 5px; margin: 20px 0; }
    </style>
</head>
<body>

    <div id="start-screen" class="screen" style="display: flex;">
        <h1>社群媒體研究：遠端眼動實驗</h1>
        <p>請確保環境光線充足並正對鏡頭。</p>
        <button class="btn" id="start-btn" onclick="setupWebGazer()">啟動實驗並校正</button>
    </div>

    <div id="calib-points">
        <input type="button" class="Calibration" id="Pt1" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt2" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt3" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt4" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt5" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt6" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt7" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt8" onclick="clickCalib(this)">
        <input type="button" class="Calibration" id="Pt9" onclick="clickCalib(this)">
    </div>

    <div id="experiment-stage">
        <div class="post-column"><img id="img-L" class="post-img"><img id="int-L" class="interact-img"></div>
        <div class="post-column"><img id="img-R" class="post-img"><img id="int-R" class="interact-img"></div>
    </div>

    <div id="quiz-screen" class="screen">
        <h2 style="color:red">閱讀測驗</h2>
        <p id="quiz-q" style="font-size:24px"></p>
        <button class="btn" onclick="handleQuiz('是')">是</button>
        <button class="btn" onclick="handleQuiz('否')">否</button>
    </div>

    <div id="scale-screen" class="screen">
        <h2>您比較認同哪一側的觀點？</h2>
        <div class="scale-btns" id="scale-container"></div>
        <div class="scale-labels"><span>← 完全認同左側</span><span>完全認同右側 →</span></div>
    </div>

    <div id="finish-screen" class="screen">
        <h1>實驗結束</h1>
        <p id="status">數據傳送中，請稍候...</p>
    </div>
