<script src="webgazer.js" onload="
    const btn = document.getElementById('start-btn');
    btn.disabled = false;
    btn.innerText = '啟動實驗系統';
    btn.style.background = '#4CAF50';
    btn.style.color = 'white';
"></script>

<script>
async function startApp() {
    if (typeof webgazer === 'undefined') {
        alert("找不到 webgazer.js 檔案，請確認上傳路徑。");
        return;
    }

    // 2. ⭐ 強制指定根路徑為你的 GitHub 網址
    // 假設你的網址是 https://long0920.github.io/Eye_Tracking_experiment-/
    webgazer.params.setStaticRoot("./"); 

    document.getElementById('start-btn').style.display = 'none';
    
    await webgazer.setRegression('ridge').setGazeListener(function(data) {
        if (data && isRecording) recordGaze(data);
    }).begin();

    webgazer.showPredictionPoints(false); 
    beginCalibration();
}
</script>
