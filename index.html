        #webgazerVideoContainer, #webgazerVideoFeed { 
            position: fixed !important; 
            top: 0 !important; 
            left: 0 !important;

            opacity: 0.01 !important; /* 1% 透明度，肉眼看不見，但瀏覽器覺得它還活著 */
            z-index: -9999 !important; /* 藏在白色背景的最後面 */
            pointer-events: none !important; 
        }

        /* 臉部綠框、紅點、繪圖畫布，這些不影響 AI 運算，直接徹底隱藏 */
