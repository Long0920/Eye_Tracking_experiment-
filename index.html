<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <title>社群媒體研究 - 數據收集系統</title>
    <style>
        /* 🚨 保持視訊可見但縮小，防止瀏覽器判定網頁異常而關閉鏡頭 */
        #webgazerVideoContainer { 
            display: block !important; 
            position: fixed !important; 
            bottom: 10px !important; 
            right: 10px !important; 
            width: 160px !important; 
            height: 120px !important; 
            z-index: 99999 !important;
            border: 2px solid #ccc;
        }
        #webgazerFaceFeedbackBox, #webgazerFaceDot, #plotting_canvas { display: none !important; }

        body { font-family: sans-serif; margin: 0; background: #fff; overflow: hidden; }
        #experiment-stage { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; justify-content: center; align-items: center; z-index: 5000; }
        .poster-column { width: 40vw; border: 1px solid #eee; display: flex; flex-direction: column; }
        .post-content { width: 100%; height: auto; }
        .interact-bar { width: 100%; height: auto; }
        #decision-screen, #reading-test-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 6000; flex-direction: column; justify-content: center; align-items: center; }
        .scale-btn { width: 50px; height: 50px; margin: 5px; cursor: pointer; }
        .dot { width: 20px; height: 20px; border-radius: 50%; background: red; position: fixed; display: none; z-index: 30000; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 20000; flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 10px 20px; font-size: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <button id="start-btn" onclick="startApp()" disabled style="position:fixed; top:20px; left:20px; z-index:40000;">載入中...</button>

    <div class="dot" id="pt1" onclick="clickDot(this)" style="top:10%;left:10%"></div>
    <div class="dot" id="pt5" onclick="clickDot(this)" style="top:50%;left:50%"></div>
    <div class="dot" id="pt9" onclick="clickDot(this)" style="top:90%;left:90%"></div>

    <div id="ready-screen" class="overlay">
        <h2>校正完成</h2>
        <button class="btn" onclick="runEyeTrackingPhase()">進入實驗</button>
    </div>

    <div id="experiment-stage">
        <div class="poster-column"><img class="post-content" id="img-left" src=""><img class="interact-bar" id="int-left" src=""></div>
        <div class="poster-column"><img class="post-content" id="img-right" src=""><img class="interact-bar" id="int-right" src=""></div>
    </div>

    <div id="decision-screen">
        <h3>您的認同程度？(-5 到 5)</h3>
        <div>
            <button class="scale-btn" onclick="recordDecision(-5)">-5</button>
            <button class="scale-btn" onclick="recordDecision(0)">0</button>
            <button class="scale-btn" onclick="recordDecision(5)">5</button>
        </div>
    </div>

    <div id="finish-screen" class="overlay">
        <h2>實驗結束</h2>
        <button class="btn" onclick="uploadAll()">傳送所有數據</button>
        <p id="status"></p>
    </div>

    <script src="https://unpkg.com/webgazer@2.0.1/dist/webgazer.js"></script>
    <script>
        window.onload = () => { document.getElementById('start-btn').disabled = false; document.getElementById('start-btn').innerText = '開始實驗'; };

        let rawData = [], decisionData = [], isRecording = false;
        const sessionID = "S_" + Date.now();
        const scriptURL = "https://script.google.com/macros/s/AKfycbydETLsefFpPymrO8Zwr7KhHe9x-6kUZfKAaaVpLieENm_SXpUceDccxaYg31pGDyxsLA/exec";

        async function startApp() {
            document.getElementById('start-btn').style.display = 'none';
            await webgazer.setRegression('ridge').setGazeListener((data) => {
                if (data && isRecording) {
                    rawData.push({ sessionID, round: 1, x: Math.round(data.x), y: Math.round(data.y), timestamp: Date.now() });
                }
            }).begin();
            document.querySelectorAll('.dot').forEach(d => d.style.display = 'block');
        }

        function clickDot(el) { el.style.display = 'none'; if(document.querySelectorAll('.dot[style*="block"]').length === 0) showReady(); }
        function showReady() { document.getElementById('ready-screen').style.display = 'flex'; }
        
        function runEyeTrackingPhase() {
            document.getElementById('ready-screen').style.display = 'none';
            document.getElementById('experiment-stage').style.display = 'flex';
            isRecording = true;
            // 測試簡化版：5秒後進入決策
            setTimeout(() => {
                isRecording = false;
                document.getElementById('experiment-stage').style.display = 'none';
                document.getElementById('decision-screen').style.display = 'flex';
            }, 5000);
        }

        function recordDecision(val) {
            decisionData.push({ sessionID, choiceScore: val });
            document.getElementById('decision-screen').style.display = 'none';
            document.getElementById('finish-screen').style.display = 'flex';
        }

        async function uploadAll() {
            const status = document.getElementById('status');
            status.innerText = "傳送中...";
            try {
                // 分開傳送眼動與決策
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'eye_data', data: rawData }) });
                await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'decision_data', data: decisionData }) });
                status.innerText = "成功！請檢查雲端表格。";
            } catch (e) {
                status.innerText = "失敗: " + e.message;
            }
        }
    </script>
</body>
</html>
